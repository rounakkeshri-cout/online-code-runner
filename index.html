<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Runner - Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
                <h1>Code Runner</h1>
            </div>
        </div>
        <div class="header-buttons">
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌙</button>
            <button class="intelligence-toggle" onclick="toggleIntelligence()" title="Toggle AI Code Intelligence">🧠 AI</button>
            <button class="save-button" onclick="saveCode()" title="Save Code">💾</button>
            <button class="download-button" onclick="downloadZip()" title="Download as ZIP">📦</button>
            <button class="run-button" onclick="runCode()" title="Run Code">▶ Run</button>
        </div>
    </div>

    <div class="container">
        <div class="editors">
            <div class="editor-box">
                <div class="editor-header html-header">
                    <span class="editor-icon">📄</span>
                    <span>HTML</span>
                </div>
                <div class="editor-wrapper">
                    <textarea id="htmlCode" placeholder="Write your HTML code here..."></textarea>
                    <div class="autocomplete-dropdown" id="htmlAutocomplete"></div>
                </div>
                <div class="error-panel" id="htmlErrors"></div>
            </div>

            <div class="editor-box">
                <div class="editor-header css-header">
                    <span class="editor-icon">🖌️</span>
                    <span>CSS</span>
                </div>
                <div class="editor-wrapper">
                    <textarea id="cssCode" placeholder="Write your CSS code here..."></textarea>
                    <div class="autocomplete-dropdown" id="cssAutocomplete"></div>
                </div>
                <div class="error-panel" id="cssErrors"></div>
            </div>

            <div class="editor-box">
                <div class="editor-header js-header">
                    <span class="editor-icon">⚙️</span>
                    <span>JavaScript</span>
                </div>
                <div class="editor-wrapper">
                    <textarea id="jsCode" placeholder="Write your JavaScript code here..."></textarea>
                    <div class="autocomplete-dropdown" id="jsAutocomplete"></div>
                </div>
                <div class="error-panel" id="jsErrors"></div>
            </div>
        </div>

        <div class="output-section">
            <div class="output-header">
                <span class="output-icon">🔍</span>
                <span>Preview</span>
            </div>
            <iframe id="output"></iframe>
            <div class="console-panel" id="consolePanel">
                <div class="console-header">
                    <span class="console-icon">📟</span>
                    <span>Console Output</span>
                </div>
                <div class="console-content" id="consoleContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
